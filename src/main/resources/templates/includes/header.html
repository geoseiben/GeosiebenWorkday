<header th:fragment="header"
        class="bg-white border-b sticky top-0 z-[1000] shadow-sm"
        style="font-family: 'Inter', system-ui, -apple-system, sans-serif; overflow: visible !important;">
    <div class="w-full mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">

            <div class="flex items-center gap-10">
                <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='/dashboard'">
                    <div class="w-10 h-10 bg-[#4f46e5] rounded-xl flex items-center justify-center shadow-lg transition-transform hover:scale-105">
                        <span class="text-white font-black text-lg tracking-tighter">G7</span>
                    </div>
                    <a href="/dashboard" class="no-underline">
                        <span class="text-xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-600 hidden sm:block tracking-tight">
                            Geosieben
                        </span>
                    </a>
                </div>

                <nav class="hidden md:flex items-center">
                    <div sec:authorize="hasAnyAuthority('admin')" class="relative group h-16 flex items-center">
                        <button class="flex items-center gap-1 px-3 py-2 text-sm font-semibold text-gray-600 group-hover:text-[#4f46e5] transition-colors">
                            Employee
                            <svg class="w-4 h-4 transition-transform group-hover:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </button>
                        <div class="hidden group-hover:block absolute top-[60px] left-0 w-48 bg-white border border-gray-100 rounded-xl shadow-xl p-2 z-[9999]">
                            <a href="/admin/addemployee" class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-[#4f46e5] rounded-lg no-underline">Add Employee</a>
                            <a href="/admin/activeEmployees" class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-[#4f46e5] rounded-lg no-underline">Active Employees</a>
                            <button onclick="showView('reports')" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-[#4f46e5] rounded-lg">Real-time Feed</button>
                        </div>
                    </div>

                    <div sec:authorize="hasAnyAuthority('admin','user','hr')" class="relative group h-16 flex items-center">
                        <button class="flex items-center gap-1 px-3 py-2 text-sm font-semibold text-gray-600 group-hover:text-[#4f46e5] transition-colors">
                            Leaves
                            <svg class="w-4 h-4 transition-transform group-hover:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </button>
                        <div class="hidden group-hover:block absolute top-[60px] left-0 w-48 bg-white border border-gray-100 rounded-xl shadow-xl p-2 z-[9999]">
                            <a href="/leaves/apply" class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-[#4f46e5] rounded-lg no-underline">Apply Leave</a>
                            <a sec:authorize="hasAnyAuthority('admin')" href="/admin/pendingLeaves" class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-[#4f46e5] rounded-lg no-underline">Leave Requests</a>
                        </div>
                    </div>

                    <div class="relative group h-16 flex items-center">
                        <button class="flex items-center gap-1 px-3 py-2 text-sm font-semibold text-gray-600 group-hover:text-[#4f46e5] transition-colors">
                            Separation
                            <svg class="w-4 h-4 transition-transform group-hover:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </button>
                        <div class="hidden group-hover:block absolute top-[60px] left-0 w-48 bg-white border border-gray-100 rounded-xl shadow-xl p-2 z-[9999]">
                            <a href="/separtion/resign" class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-[#4f46e5] rounded-lg no-underline">Resign</a>                           
                            <a sec:authorize="hasAnyAuthority('hr','admin')" href="/admin/separtion/manage" class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-[#4f46e5] rounded-lg no-underline">Manage</a>                           
                        </div>
                    </div>

                    <div class="relative group h-16 flex items-center">
                        <button class="flex items-center gap-1 px-3 py-2 text-sm font-semibold text-gray-600 group-hover:text-[#4f46e5] transition-colors">
                            IT
                            <svg class="w-4 h-4 transition-transform group-hover:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </button>
                        <div class="hidden group-hover:block absolute top-[60px] left-0 w-48 bg-white border border-gray-100 rounded-xl shadow-xl p-2 z-[9999]">
                            <a sec:authorize="hasAuthority('admin')" href="/it/dashboard" class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-[#4f46e5] rounded-lg no-underline">IT Dashboard</a>
                            <a href="/raiseTicket" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-[#4f46e5] rounded-lg no-underline block">Raise Ticket</a>
                            <button class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-[#4f46e5] rounded-lg">Active Tickets</button>
                            <button class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-[#4f46e5] rounded-lg">Closed Tickets</button>
                        </div>
                    </div>  

                    <div sec:authorize="hasAuthority('admin')" class="relative group h-16 flex items-center">
                        <button class="flex items-center gap-1 px-3 py-2 text-sm font-semibold text-gray-600 group-hover:text-[#4f46e5] transition-colors">
                            Production
                            <svg class="w-4 h-4 transition-transform group-hover:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </button>
                        <div class="hidden group-hover:block absolute top-[60px] left-0 w-52 bg-white border border-gray-100 rounded-xl shadow-xl p-2 z-[9999]">
                            <div class="relative group/sub">
                                <button class="flex items-center justify-between w-full px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-[#4f46e5] rounded-lg transition-colors">
                                    <span>Projects</span>   
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                                </button>
                                <div class="hidden group-hover/sub:block absolute left-full top-0 ml-1 w-48 bg-white border border-gray-100 rounded-xl shadow-xl p-2">
                                    <a href="/admin/project/clients_stats" class="block px-4 py-2 text-sm text-gray-600 hover:bg-indigo-50 hover:text-[#4f46e5] rounded-lg no-underline">Client Stats</a>
                                    <a href="/admin/project/active" class="block px-4 py-2 text-sm text-gray-600 hover:bg-indigo-50 hover:text-[#4f46e5] rounded-lg no-underline">Active Projects</a>
                                    <a href="/admin/project/history" class="block px-4 py-2 text-sm text-gray-600 hover:bg-indigo-50 hover:text-[#4f46e5] rounded-lg no-underline">Project History</a>
                                </div>
                            </div>
                            <div class="relative group/sub">
                                <button class="flex items-center justify-between w-full px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-[#4f46e5] rounded-lg transition-colors">
                                    <span>Pilots</span>
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                                </button>
                                <div class="hidden group-hover/sub:block absolute left-full top-0 ml-1 w-48 bg-white border border-gray-100 rounded-xl shadow-xl p-2">
                                    <a href="/admin/pilot/clients_stats" class="block px-4 py-2 text-sm text-gray-600 hover:bg-indigo-50 hover:text-[#4f46e5] rounded-lg no-underline">Pilot Analytics</a>
                                    <a href="/admin/pilot/onboarding" class="block px-4 py-2 text-sm text-gray-600 hover:bg-indigo-50 hover:text-[#4f46e5] rounded-lg no-underline">Onboarding</a>
                                </div>
                            </div>
                            <div class="border-t border-gray-100 my-1"></div>
                            <a href="/admin/clients" class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-[#4f46e5] rounded-lg no-underline">Manage Clients</a>
                        </div>
                    </div>

                    <div sec:authorize="hasAnyAuthority('admin','hr')" class="relative group h-16 flex items-center">
                        <button class="flex items-center gap-1 px-3 py-2 text-sm font-semibold text-gray-600 group-hover:text-[#4f46e5] transition-colors">
                            Careers
                            <svg class="w-4 h-4 transition-transform group-hover:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </button>
                        <div class="hidden group-hover:block absolute top-[60px] left-0 w-48 bg-white border border-gray-100 rounded-xl shadow-xl p-2 z-[9999]">
                            <a href="/admin/careers/addCandidate" class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-[#4f46e5] rounded-lg no-underline">Register Candidate</a>
                            <a href="/admin/careers/manageCandidates" class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-[#4f46e5] rounded-lg no-underline">Manage Candidates</a>
                        </div>
                    </div>
                </nav>
            </div>

            <div class="flex items-center">
                <div class="relative group h-16 flex items-center">
                    <button class="flex items-center gap-2 p-1 hover:bg-gray-50 rounded-full transition-all duration-200 border border-transparent hover:border-gray-200">
                        <img class="h-9 w-9 rounded-full border-2 border-indigo-100 shadow-sm"
                             src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff"
                             alt="User">
                        <svg class="w-4 h-4 text-gray-400 transition-transform group-hover:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </button>
                    
                    <div class="hidden group-hover:block absolute top-[60px] right-0 w-56 bg-white border border-gray-100 rounded-2xl shadow-2xl p-2 z-[9999] animate-in fade-in slide-in-from-top-2 duration-200">
                        <div class="px-4 py-3 mb-1 border-b border-gray-50">
                            <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Account</p>
                        </div>
                        
                        <a href="/myprofile" class="flex items-center gap-3 w-full text-left px-4 py-2.5 text-sm text-gray-700 hover:bg-indigo-50 hover:text-[#4f46e5] rounded-xl transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                            My Profile
                        </a>
                        
                        <button onclick="showView('settings')" class="flex items-center gap-3 w-full text-left px-4 py-2.5 text-sm text-gray-700 hover:bg-indigo-50 hover:text-[#4f46e5] rounded-xl transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                            App Settings
                        </button>

                        <div class="border-t border-gray-100 my-1"></div>
                        
                        <form th:action="@{/logout}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="flex items-center gap-3 w-full text-left px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 rounded-xl transition-colors font-medium">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                                Sign Out
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>
