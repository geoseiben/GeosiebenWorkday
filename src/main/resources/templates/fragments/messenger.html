<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="chat-widget">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .chat-container { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); transform-origin: bottom right; }
        .chat-hidden { opacity: 0; transform: translateY(30px) scale(0.9); pointer-events: none; }
        .chat-visible { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
        .user-bubble { background-color: #18181b; color: white; border-radius: 18px 18px 2px 18px; }
        .ai-bubble { background-color: #f4f4f5; color: #27272a; border-radius: 18px 18px 18px 2px; }
        
        /* Utility for view transitions */
        .view-hidden { display: none !important; }
    </style>

    <button id="chatToggle" class="fixed bottom-6 right-6 w-16 h-16 bg-zinc-900 rounded-full flex items-center justify-center text-white transition-all hover:scale-110 z-50 shadow-xl">
        <i class="fa-solid fa-comment-dots text-2xl" id="toggleIcon"></i>
        <div id="unreadBadge" th:if="${unreadCount > 0}" th:text="${unreadCount}"
             class="absolute -top-1 -right-1 w-6 h-6 bg-indigo-600 border-4 border-white rounded-full flex items-center justify-center text-[10px] font-bold">1</div>
    </button>

    <div id="chatOverlay" class="chat-hidden chat-container fixed bottom-24 right-6 w-[380px] h-[600px] bg-white rounded-[2rem] shadow-2xl flex flex-col border border-zinc-100 overflow-hidden z-50">
        
        <div id="listView" class="flex flex-col h-full bg-white">
            <header class="px-8 pt-8 pb-4 flex justify-between items-center">
                <div>
                    <h2 class="font-bold text-2xl text-zinc-900">Inbox</h2>
                    <p class="text-xs text-zinc-400 font-medium" th:text="${unreadCount + ' unread messages'}">0 unread</p>
                </div>
                <button onclick="showContacts()" class="w-10 h-10 bg-zinc-50 text-zinc-900 rounded-xl hover:bg-zinc-100 transition-all flex items-center justify-center">
                    <i class="fa-solid fa-plus text-sm"></i>
                </button>
            </header>
            
            <div class="flex-1 overflow-y-auto custom-scrollbar px-4">
                <div th:each="chat : ${globalChats}" 
                     class="flex items-center p-4 hover:bg-zinc-50 rounded-2xl cursor-pointer transition-all" 
                     th:onclick="openChat([[${chat.name}]], [[${chat.avatarUrl}]])">
                    <div class="relative">
                        <img th:src="${chat.avatarUrl}" class="w-12 h-12 rounded-xl object-cover">
                        <div th:if="${chat.online}" class="absolute -bottom-1 -right-1 w-3 h-3 bg-emerald-500 border-2 border-white rounded-full"></div>
                    </div>
                    <div class="ml-4 flex-1">
                        <div class="flex justify-between">
                            <span class="font-bold text-sm" th:text="${chat.name}">Name</span>
                            <span class="text-[10px] text-zinc-400" th:text="${chat.lastTime}">Time</span>
                        </div>
                        <p class="text-xs text-zinc-500 truncate w-40" th:text="${chat.lastMessage}">Message...</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="contactsView" class="view-hidden flex-col h-full bg-white">
            <header class="p-6 border-b flex items-center">
                <button onclick="backToInbox()" class="mr-4 text-zinc-400 hover:text-zinc-900 transition-colors">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <h3 class="font-bold text-lg text-zinc-900">New Message</h3>
            </header>
            
            <div class="px-6 py-4">
                <div class="relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400 text-xs"></i>
                    <input type="text" placeholder="Search contacts..." 
                           class="w-full bg-zinc-100 rounded-xl pl-9 pr-4 py-2.5 text-xs outline-none focus:ring-2 focus:ring-zinc-200 transition-all">
                </div>
            </div>

            <div class="flex-1 overflow-y-auto custom-scrollbar px-4">
                <div th:each="user : ${availableUsers}" 
                     class="flex items-center p-3 hover:bg-zinc-50 rounded-2xl cursor-pointer transition-all"
                     th:onclick="openChat([[${user.name}]], [[${user.avatarUrl}]])">
                    <img th:src="${user.avatarUrl}" class="w-10 h-10 rounded-lg object-cover">
                    <div class="ml-3">
                        <p class="text-sm font-bold text-zinc-900" th:text="${user.name}">Contact Name</p>
                        <p class="text-[10px] text-zinc-400">Available to chat</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="conversationView" class="view-hidden flex-col h-full bg-[#fcfcfc]">
            <header class="p-4 border-b flex items-center bg-white/80 backdrop-blur-md">
                <button onclick="backToInbox()" class="mr-3 text-zinc-400 hover:text-zinc-900"><i class="fa-solid fa-chevron-left"></i></button>
                <img id="activeAvatar" class="w-8 h-8 rounded-lg object-cover">
                <div class="ml-3">
                    <h3 id="activeName" class="font-bold text-sm text-zinc-900 leading-tight">Name</h3>
                    <span class="text-[10px] text-emerald-500 font-medium">Online</span>
                </div>
            </header>
            <div id="messageDisplay" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
                </div>
            <footer class="p-4 bg-white border-t">
                <div class="flex items-center bg-zinc-50 rounded-xl px-4 py-2">
                    <input type="text" id="messageInput" placeholder="Write a message..." class="flex-1 bg-transparent text-sm outline-none">
                    <button id="sendBtn" class="hidden text-indigo-600 font-bold text-xs ml-2 uppercase">Send</button>
                </div>
            </footer>
        </div>
    </div>

    <script th:inline="javascript">
        const chatToggle = document.getElementById('chatToggle');
        const chatOverlay = document.getElementById('chatOverlay');
        
        const listView = document.getElementById('listView');
        const contactsView = document.getElementById('contactsView');
        const conversationView = document.getElementById('conversationView');
        
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        // Toggle Chat Window
        chatToggle.addEventListener('click', () => {
            chatOverlay.classList.toggle('chat-visible');
            chatOverlay.classList.toggle('chat-hidden');
        });

        // Navigation: Open Contact List
        function showContacts() {
            listView.classList.add('view-hidden');
            contactsView.classList.remove('view-hidden');
            conversationView.classList.add('view-hidden');
        }

        // Navigation: Go back to Inbox
        function backToInbox() {
            listView.classList.remove('view-hidden');
            contactsView.classList.add('view-hidden');
            conversationView.classList.add('view-hidden');
        }

        // Navigation: Open a specific Chat (from Inbox or Contacts)
        function openChat(name, avatar) {
            document.getElementById('activeName').innerText = name;
            document.getElementById('activeAvatar').src = avatar;
            
            listView.classList.add('view-hidden');
            contactsView.classList.add('view-hidden');
            conversationView.classList.remove('view-hidden');
            
            // Optional: Scroll to bottom of messages
            const msgDisplay = document.getElementById('messageDisplay');
            msgDisplay.scrollTop = msgDisplay.scrollHeight;
        }

        // Send Button Visibility
        messageInput.addEventListener('input', (e) => {
            sendBtn.classList.toggle('hidden', e.target.value.trim() === '');
        });
    </script>
</div>
</html>
