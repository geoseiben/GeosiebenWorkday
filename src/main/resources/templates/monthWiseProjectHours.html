<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <title>Monthly Hour | Admin Portal</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/2.0.8/css/dataTables.bootstrap5.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --brand-primary: #6366f1;
            --bg-main: #f8fafc;
            --border-color: #f1f5f9;
        }

        body { background: var(--bg-main); font-family: 'Inter', sans-serif; color: #334155; font-size: 0.875rem; }
        h2 { font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: -0.02em; }

        .glass-card { 
            background: #ffffff; 
            border: 1px solid #e2e8f0; 
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            border-radius: 12px; 
            overflow: hidden;
        }

        /* Micro-interactions for Buttons */
        .btn-interact {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .btn-interact:active { transform: scale(0.95); }
        .btn-interact:hover { background-color: #f8fafc; border-color: #cbd5e1; }

        /* Table Micro-interactions */
        #enhancedDataTable tbody tr {
            transition: all 0.2s ease;
            cursor: default;
        }
        #enhancedDataTable tbody tr:hover {
            background-color: #f8fafc !important;
            transform: scale(1.002);
            box-shadow: inset 4px 0 0 var(--brand-primary);
        }

        /* Compact Table Header */
        #enhancedDataTable thead th {
            background: #f8fafc;
            color: #64748b;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 10px 14px;
            border-bottom: 1px solid #e2e8f0;
        }

        /* Refined Month Link */
        .month-link {
            color: var(--brand-primary);
            font-weight: 600;
            text-decoration: none;
            padding: 4px 10px;
            border-radius: 6px;
            background: #f5f3ff;
            transition: all 0.2s ease;
            display: inline-block;
            border: 1px solid transparent;
        }
        .month-link:hover {
            background: var(--brand-primary);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.3);
        }

        .total-pill {
            background: #1e293b;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.75rem;
            transition: transform 0.2s;
        }
        tr:hover .total-pill { transform: scale(1.1); }

        /* Compact Chart Wrapper */
        .chart-container {
            position: relative;
            height: 240px; 
            width: 100%;
        }

        /* Customizing Scrollbar for Table */
        .table-responsive::-webkit-scrollbar { height: 4px; }
        .table-responsive::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>

<header th:replace="~{includes/header :: header}"></header>

<div class="container-fluid py-4 px-4">
    <div class="glass-card">
        <div class="p-3 bg-white d-flex justify-content-between align-items-center border-bottom">
            <div>
                <h2 class="text-xl font-bold text-slate-800 mb-0">Monthly Hours Report</h2>
                <p class="text-slate-400 text-xs mb-0 font-medium">Visual analytics and data logs</p>
            </div>
            <div class="d-flex gap-2 align-items-center">
                <button id="btnToggleChart" class="btn btn-white border btn-interact shadow-sm btn-sm px-3 rounded-md font-semibold text-slate-600">
                    <i class="fa-solid fa-chart-simple me-2 text-indigo-500"></i>Show Analytics
                </button>
                <div class="h-6 w-[1px] bg-slate-200 mx-1"></div>
                <span id="queueCount" class="text-[10px] font-bold bg-slate-100 text-slate-500 py-1 px-2 rounded uppercase tracking-wider">0 Months</span>
            </div>
        </div>

        <div id="chartWrapper" class="p-3 bg-slate-50/50 border-bottom" style="display: none;">
            <div class="chart-container">
                <canvas id="hoursChart"></canvas>
            </div>
        </div>
        
        <div class="table-responsive">
            <table id="enhancedDataTable" class="table align-middle mb-0 border-top-0">
                <thead>
                    <tr>
                        <th class="text-center" style="width: 50px">#</th>
                        <th>Project Name</th>
                        <th>Production</th>
                        <th>QC</th>
                        <th>Delivery</th>
                        <th>Pilot</th>
                        <th class="text-end pe-4">Total</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="text-slate-600"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
<script src="https://cdn.datatables.net/2.0.8/js/dataTables.bootstrap5.min.js"></script>

<script>
        const params = new URLSearchParams(window.location.search);
        const month = params.get("month");
        console.log(month);
    let hoursChart = null;
    let reportData = [];

    $(document).ready(function() {
        fetchData();

        $('#btnToggleChart').on('click', function() {
            const isHidden = $('#chartWrapper').is(':hidden');
            
            $('#chartWrapper').slideToggle({
                duration: 300,
                easing: 'swing',
                start: function() {
                    if (isHidden) {
                        $('#btnToggleChart').html('<i class="fa-solid fa-table-list me-2 text-indigo-500"></i>Hide Analytics');
                    } else {
                        $('#btnToggleChart').html('<i class="fa-solid fa-chart-simple me-2 text-indigo-500"></i>Show Analytics');
                    }
                },
                complete: function() {
                    if (isHidden) initChart();
                }
            });
        });
    });

    function fetchData() {
        $.ajax({
            url: '/admin/project/getProjectHoursByMonth',
            type: 'GET',
            data:{month:month},
            success: function(res) {
                reportData = res || [];
                renderTable(reportData);
                $('#queueCount').text(reportData.length + ' Months');
            }
        });
    }

    function renderTable(data) {
        if ($.fn.DataTable.isDataTable('#enhancedDataTable')) {
            $('#enhancedDataTable').DataTable().destroy();
        }

        const $tbody = $('#tableBody');
        $tbody.empty();

        data.forEach((item, index) => {
            $tbody.append(`
                <tr>
                    <td class="text-center text-slate-300 font-mono text-xs">${index + 1}</td>
                    <td>
                        <a href="/admin/project/monthWiseProjectHours?month=${encodeURIComponent(item.monthName)}" class="month-link">
                            ${item.projectName}
                        </a>
                    </td>
                    <td class="font-medium text-slate-700">${item.prodHours} <span class="text-[10px] text-slate-400">h</span></td>
                    <td>${item.qcHours} <span class="text-[10px] text-slate-400">h</span></td>
                    <td>${item.deliveryHours} <span class="text-[10px] text-slate-400">h</span></td>
                    <td>${item.pilotHours} <span class="text-[10px] text-slate-400">h</span></td>
                    <td class="text-end pe-4"><span class="total-pill">${item.totalHours}</span></td>
                </tr>
            `);
        });

        $('#enhancedDataTable').DataTable({
            pageLength: 10,
            dom: '<"p-2 d-flex justify-content-end"f>rt<"p-2 d-flex justify-content-between align-items-center"ip>',
            language: { 
                search: "", 
                searchPlaceholder: "Search records...",
                info: "Showing _START_ to _END_ of _TOTAL_"
            }
        });
    }

    function initChart() {
        const ctx = document.getElementById('hoursChart').getContext('2d');
        if (hoursChart) hoursChart.destroy();

        hoursChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: reportData.map(d => d.monthName),
                datasets: [
                    { 
                        label: 'Production', 
                        data: reportData.map(d => d.prodHours), 
                        backgroundColor: '#6366f1', 
                        borderRadius: 4,
                        barThickness: 15
                    },
                    { 
                        label: 'QC', 
                        data: reportData.map(d => d.qcHours), 
                        backgroundColor: '#cbd5e1', 
                        borderRadius: 4,
                        barThickness: 15
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { 
                        position: 'top', 
                        align: 'end',
                        labels: { boxWidth: 10, font: { family: 'Inter', size: 10, weight: '600' } } 
                    }
                },
                scales: {
                    x: { stacked: true, grid: { display: false }, ticks: { font: { size: 10 } } },
                    y: { stacked: true, beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { font: { size: 10 } } }
                }
            }
        });
    }
</script>
</body>
</html>
