<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <title>Separation Management | Admin Portal</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/2.0.8/css/dataTables.bootstrap5.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --brand-primary: #6366f1;
            --bg-main: #f8fafc;
            --border-color: #e2e8f0;
        }

        body { background: var(--bg-main); font-family: 'Inter', sans-serif; color: #0f172a; }
        h2 { font-family: 'Plus Jakarta Sans', sans-serif; }

        .glass-card { background: #ffffff; border: 1px solid var(--border-color); box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); border-radius: 12px; }
        
        #enhancedDataTable thead th {
            background: #f8fafc;
            color: #64748b;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.025em;
            padding: 12px;
            border-bottom: 2px solid var(--border-color);
        }

        .status-pill { padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; display: inline-block; border: 1px solid transparent; }
        .pill-pending { background: #fff7ed; color: #9a3412; border-color: #ffedd5; }
        .pill-approved { background: #ecfdf5; color: #065f46; border-color: #d1fae5; }
        .pill-rejected { background: #fef2f2; color: #991b1b; border-color: #fee2e2; }
        
        .remarks-input { 
            font-size: 0.8rem; 
            border-radius: 6px; 
            border: 1px solid #cbd5e1; 
            padding: 5px 8px;
            width: 100%;
        }
        .remarks-input:disabled { background-color: #f1f5f9; cursor: not-allowed; }

        .btn-icon {
            width: 32px; height: 32px;
            display: inline-flex; align-items: center; justify-content: center;
            border-radius: 6px; transition: all 0.2s; border: none; font-size: 0.85rem;
        }
        .btn-approve { background: #ecfdf5; color: #059669; }
        .btn-approve:hover { background: #059669; color: white; }
        
        .btn-reject { background: #fef2f2; color: #dc2626; }
        .btn-reject:hover { background: #dc2626; color: white; }

        .btn-withdraw { background: #fff7ed; color: #ea580c; }
        .btn-withdraw:hover { background: #ea580c; color: white; }

        .btn-view { color: #6366f1; background: #f5f3ff; }
        .btn-view:hover { background: #6366f1; color: white; }
    </style>
</head>
<body>

<header th:replace="~{includes/header :: header}"></header>

<div class="container-fluid py-4">
    <div class="glass-card p-0 overflow-hidden">
        <div class="p-4 border-bottom bg-white d-flex justify-content-between align-items-center">
            <h2 class="fw-bold text-slate-800 mb-0">Separation Requests <span id="queueCount" class="badge bg-slate-100 text-slate-600 ms-2">0</span></h2>
        </div>
        
        <div class="table-responsive">
            <table id="enhancedDataTable" class="table align-middle mb-0">
                <thead>
                    <tr>
                        <th style="width: 50px">#</th>
                        <th>Employee</th>
                        <th>Type/Reason</th>
                        <th>Resigned</th>
                        <th>LWD</th>
                        <th>Status</th>
                        <th>Admin Remarks</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
<script src="https://cdn.datatables.net/2.0.8/js/dataTables.bootstrap5.min.js"></script>

<script>
    $(document).ready(function() {
        fetchData();
    });

    function fetchData() {
        $.ajax({
            url: '/admin/separtion/getRequests',
            type: 'GET',
            success: function(res) {
                renderTable(res);
                $('#queueCount').text(res ? res.length : 0);
            }
        });
    }

    function formatDate(dateStr) {
        if(!dateStr) return 'N/A';
        const date = new Date(dateStr);
        return date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
    }

    function renderTable(data) {
        if ($.fn.DataTable.isDataTable('#enhancedDataTable')) {
            $('#enhancedDataTable').DataTable().destroy();
        }

        const $tbody = $('#tableBody');
        $tbody.empty();

        data.forEach((item, index) => {
            let statusPill = '';
            let actionButtons = `
                <a href="/admin/separation/view?separationid=${encodeURIComponent(item.separationid)}" class="btn-icon btn-view" title="View Details">
                    <i class="fas fa-eye"></i>
                </a>`;

            // Logic based on status
            // 0 = Pending, 1 = Approved, 2 = Rejected
            if (item.status === 0) {
                statusPill = `<span class="status-pill pill-pending">Pending</span>`;
                actionButtons += `
                    <button onclick="handleUpdate('approve', ${item.separationid})" class="btn-icon btn-approve" title="Approve">
                        <i class="fas fa-check"></i>
                    </button>
                    <button onclick="handleUpdate('reject', ${item.separationid})" class="btn-icon btn-reject" title="Reject">
                        <i class="fas fa-times"></i>
                    </button>`;
            } else if (item.status === 1) {
                statusPill = `<span class="status-pill pill-approved">Approved</span>`;
                actionButtons += `
                    <button onclick="handleUpdate('withdraw', ${item.separationid})" class="btn-icon btn-withdraw" title="Withdraw Approval">
                        <i class="fas fa-rotate-left"></i>
                    </button>`;
            } else {
                statusPill = `<span class="status-pill pill-rejected">Rejected</span>`;
            }

            $tbody.append(`
                <tr data-id="${item.separationid}">
                    <td class="text-slate-400 fw-medium">${index + 1}</td>
                    <td>
                        <div class="fw-semibold text-slate-700">${item.firstName} ${item.lastName}</div>
                        <div class="text-xs text-slate-400">ID: ${item.eid}</div>
                    </td>
                    <td>
                        <div class="fw-medium text-slate-600" style="font-size: 0.85rem">${item.separationType}</div>
                        <div class="text-truncate text-slate-400 text-xs" style="max-width: 150px;">${item.reasonforLeaving}</div>
                    </td>
                    <td style="font-size: 0.85rem">${formatDate(item.resignationDate)}</td>
                    <td class="fw-bold text-indigo-600" style="font-size: 0.85rem">${formatDate(item.lastWorkingDay)}</td>
                    <td>${statusPill}</td>
                    <td>
                        <input type="text" id="remarks-${item.separationid}" 
                               class="remarks-input" 
                               placeholder="Admin notes..." 
                               value="${item.adminRemarks || ''}"
                               ${item.status !== 0 ? 'disabled' : ''}>
                    </td>
                    <td class="text-center">
                        <div class="d-flex justify-content-center gap-2">
                            ${actionButtons}
                        </div>
                    </td>
                </tr>
            `);
        });

        $('#enhancedDataTable').DataTable({
            pageLength: 10,
            dom: '<"p-3 d-flex justify-content-between"f>rt<"p-3 d-flex justify-content-between"ip>',
            language: { search: "", searchPlaceholder: "Search requests..." }
        });
    }

    async function handleUpdate(action, id) {
        const remarks = $(`#remarks-${id}`).val();
        
        if (action === 'reject' && (!remarks || !remarks.trim())) {
            return Swal.fire('Note Required', 'Please provide a reason for rejection.', 'warning');
        }

        const confirm = await Swal.fire({
            title: `Are you sure?`,
            text: `You are about to ${action} this request.`,
            icon: action === 'withdraw' ? 'warning' : 'question',
            showCancelButton: true,
            confirmButtonColor: action === 'approve' ? '#059669' : (action === 'withdraw' ? '#ea580c' : '#dc2626')
        });

        if (!confirm.isConfirmed) return;

        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

        try {
            const response = await fetch('/admin/separtion/updateStatus', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/x-www-form-urlencoded',
                    [csrfHeader]: csrfToken 
                },
                body: new URLSearchParams({ action, id, remarks: remarks || '' })
            });

            const res = await response.json();
            if (res.status === 'success') {
                Swal.fire({ icon: 'success', title: 'Updated!', toast: true, position: 'top-end', showConfirmButton: false, timer: 1500 });
                fetchData(); 
            }
        } catch (e) {
            Swal.fire('Error', 'Something went wrong', 'error');
        }
    }
</script>
</body>
</html>
