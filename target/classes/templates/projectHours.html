  <script>
  $(document).ready(function () {
      const year = "<?php echo htmlspecialchars($_GET['year']) ?>";
      const month = "<?php echo htmlspecialchars($_GET['month']) ?>";
      let hoursChart = null;

      $.ajax({
          url: '/admin/project/getHoursByProject',
          type: 'GET',
          dataType: 'json',
          success: function (res) {
              if (res && res.length > 0) {
                  populateTable(res);
                  //initChart(res);

                  $('#enhancedDataTable').DataTable({
                      responsive: true,
                      dom: 'Bfrtip',
                      pageLength: 10,
                      buttons: [
                          { extend: 'excel', className: 'btn btn-success btn-sm' },
                          { extend: 'copy', className: 'btn btn-secondary btn-sm' }
                      ]
                  });
              } else {
                  $('#header').html(`No data found for ${month} ${year}`);
                  $('#dataTableWrapper, #chartWrapper').hide();
                  $('#messageContainer').show().html("<div class='alert alert-info'>No records available for this selection.</div>");
              }
          }
      });

      function populateTable(dataset) {
          let output = '';
          dataset.forEach(row => {
            const comonth=row.otmonth??'N/A';
            console.log(row);
              output += `
                  <tr>
                      <td class='fw-bold text-center'>${row.allotmentName}</td>
                      <td class="text-primary text-center">${row.prodHours}</td>
                      <td class="text-success text-center ">${row.qcHours}</td>
                      <td class="text-warning text-center">${row.deliveryHours}</td>
                      <td class="text-info text-center">${row.pilotHours}</td> 
                      <td class="text-end fw-bold text-dark">${(parseFloat(row.totalHours))}</td>
                  </tr>`;
          });
          $('#header').html(`Booking Hours Report: ${dataset[0].month}`);
          $('#root').html(output);
      }

      function initChart(dataset) {
          const ctx = document.getElementById('hoursChart').getContext('2d');
          
          // Use a Stacked Bar Chart to show the breakdown of the total hours
          const labels = dataset.map(d => d.allotmentName);
          const prodData = dataset.map(d => parseFloat(d.prodHrs) || 0);
          const qcData = dataset.map(d => parseFloat(d.qcHrs) || 0);
          const deliveryData = dataset.map(d => parseFloat(d.deliveryHrs) || 0);
          const pilotData = dataset.map(d => parseFloat(d.pilotHours) || 0);

          hoursChart = new Chart(ctx, {
              type: 'bar',
              data: {
                  labels: labels,
                  datasets: [
                      { label: 'Production', data: prodData, backgroundColor: '#3b82f6' },
                      { label: 'QC', data: qcData, backgroundColor: '#22c55e' },
                      { label: 'Delivery', data: deliveryData, backgroundColor: '#f59e0b' },
                      { label: 'Pilot', data: pilotData, backgroundColor: '#06b6d4' }
                  ]
              },
              options: {
                  responsive: true,
                  maintainAspectRatio: false,
                  plugins: {
                      legend: { position: 'bottom' },
                      tooltip: { mode: 'index', intersect: false }
                  },
                  scales: {
                      x: { stacked: true },
                      y: { 
                          stacked: true, 
                          beginAtZero: true,
                          title: { display: true, text: 'Total Hours Worked' }
                      }
                  }
              }
          });
      }
  });
  </script>
