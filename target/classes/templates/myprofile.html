
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Employee Profile</title>
  <link rel="icon" href="assets/images/favicon-32x32.png" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; } /* Slate-50 background */
    
    /* Clean Card Styles */
    .mn-card {
        background: white;
        border: 1px solid #e2e8f0; /* Slate-200 */
        box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        transition: box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .mn-card:hover {
        border-color: #cbd5e1; /* Slate-300 */
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }
  </style>
</head>
<body class="text-slate-800 antialiased">
      <head th:replace="includes/header :: header"></head>

<div id="container"></div>
<div th:replace="~{fragments/messenger :: chat-widget}"></div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</body>
<script>
    document.addEventListener("DOMContentLoaded", function(){
        $.ajax({
            url:'/myProfileData',
            type:'GET',
            dataType:'JSON',
            success:function(res){
                let container=document.getElementById("container");
                container.innerHTML=`<main class="mn-inner max-w-8xl mx-auto px-4 sm:px-6 lg:px-8 py-4 transition-all duration-300" >

    <div class="mn-card p-6 mb-6 flex flex-col md:flex-row items-center md:items-start gap-6">
        
        <div class="relative flex-shrink-0">
            <img src="" alt="Profile" class="w-24 h-24 md:w-32 md:h-32 rounded-full object-cover border border-slate-200 shadow-sm">
            <div class="absolute bottom-1 right-1 w-4 h-4 bg-emerald-500 border-2 border-white rounded-full" title="Active"></div>
        </div>

        <div class="flex-grow text-center md:text-left">
            <div class="flex flex-col md:flex-row md:justify-between md:items-start">
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold text-slate-900">${res.firstName+' '+res.lastName}</h1>
                    <p class="text-blue-600 font-medium text-lg mt-1">${res.designation}</p>
                    <p class="text-slate-500 text-sm mt-1 flex items-center justify-center md:justify-start gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        ${res.workmail??res.email}
                    </p>
                </div>
                
                <div class="mt-4 md:mt-0 w-full md:w-48">
                    <div class="flex justify-between items-center mb-1 text-xs font-medium text-slate-500">
                        <span>Profile Completion</span>
                        <span class="text-blue-600">%</span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-1.5">
                        <div class="bg-blue-600 h-1.5 rounded-full" style="width: %"></div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6 pt-6 border-t border-slate-100">
                <div>
                    <p class="text-xs text-slate-400 uppercase font-semibold">Employee ID</p>
                    <p class="font-mono text-slate-700 font-medium">${res.eid}</p>
                </div>
                <div>
                    <p class="text-xs text-slate-400 uppercase font-semibold">Department</p>
                    <p class="text-slate-700 font-medium">Management</p>
                </div>
                <div>
                    <p class="text-xs text-slate-400 uppercase font-semibold">Joined On</p>
                    <p class="text-slate-700 font-medium">${res.dateOfJoining}</p>
                </div>
                <div>
                    <p class="text-xs text-slate-400 uppercase font-semibold">Status</p>
                    <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-emerald-100 text-emerald-800">
                    ${res.status}
                    </span>
                </div>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

        <div class="space-y-6">
            
            <div class="mn-card p-6">
                <div class="flex justify-between items-center mb-4 border-b border-slate-100 pb-3">
                    <h3 class="text-lg font-semibold text-slate-800 flex items-center gap-2">
                        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        Personal Details
                    </h3>
                </div>
                <dl class="divide-y divide-slate-100 text-sm">
                    <div class="py-3 flex justify-between">
                        <dt class="text-slate-500">Full Name</dt>
                        <dd class="text-slate-800 font-medium text-right">${res.firstName+' '+res.lastName}</dd>
                    </div>
                    <div class="py-3 flex justify-between">
                        <dt class="text-slate-500">Gender</dt>
                        <dd class="text-slate-800 font-medium text-right">${res.gender}</dd>
                    </div>
                    <div class="py-3 flex justify-between">
                        <dt class="text-slate-500">Date of Birth</dt>
                        <dd class="text-slate-800 font-medium text-right">09-Nov-1999</dd>
                    </div>
                    <div class="py-3 flex flex-col">
                        <dt class="text-slate-500 mb-1">Address</dt>
                        <dd class="text-slate-800 font-medium leading-relaxed bg-slate-50 p-3 rounded border border-slate-100">
                            ${res.address}
                        </dd>
                    </div>
                </dl>
            </div>

            <div class="mn-card p-6">
                <div class="flex justify-between items-center mb-4 border-b border-slate-100 pb-3">
                    <h3 class="text-lg font-semibold text-slate-800 flex items-center gap-2">
                        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                        Emergency Contact
                    </h3>
                </div>
                <div class="flex items-center gap-4">
                    <div class="h-10 w-10 rounded-full bg-red-50 text-red-600 flex items-center justify-center font-bold">
                        SOS
                    </div>
                    <div>
                        <p class="text-sm font-bold text-slate-800"> ${res.emergencyContactName}</p>
                        <p class="text-xs text-slate-500 uppercase">Mother</p>
                    </div>
                    <div class="ml-auto">
                        <a href="tel:${res.emergencyContactNum}" class="text-slate-600 hover:text-blue-600 border border-slate-200 px-3 py-1.5 rounded-md text-sm font-medium transition">
                            Call
                        </a>
                    </div>
                </div>
                Web Developer
                
                no-reply@geosieben.com
                
                
            </div>

        </div>

        <div class="space-y-6">

            <div class="mn-card p-6">
                 <div class="flex justify-between items-center mb-4 border-b border-slate-100 pb-3">
                    <h3 class="text-lg font-semibold text-slate-800 flex items-center gap-2">
                        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        Statutory Info
                    </h3>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="p-3 bg-slate-50 rounded border border-slate-100">
                        <p class="text-xs text-slate-500 mb-1">PAN Number</p>
                        <p class="font-mono font-semibold text-slate-800">${res.pan}</p>
                    </div>
                    <div class="p-3 bg-slate-50 rounded border border-slate-100">
                        <p class="text-xs text-slate-500 mb-1">Aadhar Number</p>
                        <p class="font-mono font-semibold text-slate-800">${res.aadhar}</p>
                    </div>
                    <div class="p-3 bg-slate-50 rounded border border-slate-100">
                        <p class="text-xs text-slate-500 mb-1">UAN Number</p>
                        <p class="font-mono font-semibold text-slate-800">${res.uan??'------------'}</p>
                    </div>
                     <div class="p-3 bg-slate-50 rounded border border-slate-100">
                        <p class="text-xs text-slate-500 mb-1">PF Start Date</p>
                        <p class="font-mono font-semibold text-slate-800">${res.pfStartDate??'--/---/----'}</p>
                    </div>
                </div>
            </div>

            <div class="mn-card p-6">
                <div class="flex justify-between items-center mb-4 border-b border-slate-100 pb-3">
                    <h3 class="text-lg font-semibold text-slate-800 flex items-center gap-2">
                        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 14v3m4-3v3m4-3v3M3 21h18M3 10h18M3 7l9-4 9 4M4 10h16v11H4V10z"></path></svg>
                        Banking Details
                    </h3>
                </div>
                <div class="space-y-4">
                    <div>
                        <p class="text-xs text-slate-500 mb-1 uppercase tracking-wide">Bank Name</p>
                        <p class="text-slate-800 font-semibold text-lg">${res.bankName}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <p class="text-xs text-slate-500 mb-1 uppercase tracking-wide">IFSC Code</p>
                            <p class="font-mono text-slate-700 bg-slate-50 px-2 py-1 rounded w-fit">KARB000184</p>
                        </div>
                        <div>
                            <p class="text-xs text-slate-500 mb-1 uppercase tracking-wide">Account No</p>
                            <p class="font-mono text-slate-700 font-semibold tracking-wide">
                               ${res.accountNumber}
                            </p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

</main>`;
            },
            error:function(err){
                console.log(err);
            }
        })
    })
</script>
</html>
